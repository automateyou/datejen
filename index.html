<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>date real people through ai first</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --sent:#682960;      /* deep Hinge purple (the person chatting) */
    --recv:#ededed;      /* grey (Jen) */
    --ink:#1a1a1a;
    --dim:#8a8a8a;
    --line:#e8e8e8;
    --accent:#682960;
    --likeBg:#f3e9ef;
    --body:'Mulish',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    --display:'Fraunces',Georgia,serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:#d9d4dd;font-family:var(--body);height:100%;overflow:hidden;}
  body{display:flex;align-items:center;justify-content:center;height:100vh;padding:14px;overflow:hidden;}
  #phone{
    width:100%;max-width:400px;height:min(94vh,720px);background:var(--bg);
    border-radius:30px;overflow:hidden;border:1px solid #e0e0e0;
    box-shadow:0 20px 60px rgba(0,0,0,.18);display:flex;flex-direction:column;position:relative;
  }
  /* status bar */
  #statusbar{display:flex;justify-content:space-between;align-items:center;
    padding:12px 22px 4px;font-size:15px;font-weight:700;color:var(--ink);flex-shrink:0;}
  /* header */
  #header{padding:6px 18px 0;flex-shrink:0;}
  #headerRow{display:flex;align-items:center;gap:14px;}
  #back{font-size:26px;color:var(--ink);font-weight:300;cursor:pointer;padding:0 4px;}
  #headerPhoto{width:40px;height:40px;border-radius:50%;object-fit:cover;}
  #headerName{font-size:27px;font-weight:800;color:var(--ink);letter-spacing:-.5px;}
  #tabs{display:flex;margin-top:12px;}
  .tab{flex:1;text-align:center;padding-bottom:10px;font-size:16px;font-weight:700;}
  .tab.active{color:var(--accent);border-bottom:2px solid var(--accent);}
  .tab.inactive{color:#bbb;font-weight:600;border-bottom:1px solid #eee;}
  /* timer banner */
  #timerBanner{display:flex;align-items:center;justify-content:center;gap:8px;
    padding:8px 16px;background:var(--likeBg);flex-shrink:0;}
  #timerText{font-size:13px;color:var(--accent);font-weight:700;}
  #timerBanner.low{background:#fdf0f0;}
  #timerBanner.low #timerText{color:#c0392b;animation:pulse 1s infinite;}
  /* messages */
  #messages{flex:1;overflow-y:auto;padding:14px 16px 8px;display:flex;flex-direction:column;}
  #messages::-webkit-scrollbar{width:0;}
  .row{display:flex;align-items:flex-end;gap:8px;margin-bottom:3px;animation:popIn .28s cubic-bezier(.2,.9,.3,1.2);}
  .row.you{justify-content:flex-end;}
  .row.jen{justify-content:flex-start;}
  .msgPhoto{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;}
  .bubble{max-width:74%;padding:11px 16px;font-size:16px;line-height:1.35;white-space:pre-wrap;
    box-shadow:0 1px 1px rgba(0,0,0,.04);font-family:var(--body);word-wrap:break-word;}
  .bubble.you{background:var(--sent);color:#fff;border-radius:22px 22px 6px 22px;}
  .bubble.jen{background:var(--recv);color:#1a1a1a;border-radius:22px 22px 22px 6px;}
  .typing{display:flex;gap:5px;background:var(--recv);padding:14px 18px;border-radius:22px 22px 22px 6px;}
  .dot{width:7px;height:7px;border-radius:50%;background:#b0b0b0;display:inline-block;}
  .dot:nth-child(1){animation:bounce 1.2s 0s infinite ease-in-out;}
  .dot:nth-child(2){animation:bounce 1.2s .15s infinite ease-in-out;}
  .dot:nth-child(3){animation:bounce 1.2s .3s infinite ease-in-out;}
  /* end card */
  #endCard{margin:16px 4px 8px;background:#fafafa;border:1.5px solid var(--accent);
    border-radius:20px;padding:20px 18px;animation:popIn .5s cubic-bezier(.2,.9,.3,1.2);}
  #endCard .top{text-align:center;margin-bottom:12px;}
  #endCard img{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);}
  #endCard h3{font-size:17px;font-weight:800;color:var(--ink);margin:8px 0 4px;}
  #endCard p{font-size:13.5px;color:var(--dim);margin:0;line-height:1.5;}
  #readTitle{font-size:12px;font-weight:800;letter-spacing:1px;color:var(--accent);
    margin:14px 0 8px;text-align:center;border-top:1px solid var(--line);padding-top:14px;}
  #readBody{color:var(--ink);font-size:14px;line-height:1.6;white-space:pre-wrap;}
  /* input */
  #inputBar{padding:10px 14px 16px;flex-shrink:0;border-top:1px solid var(--line);}
  #inputRow{display:flex;align-items:flex-end;gap:8px;}
  #msgInput{flex:1;resize:none;background:#fff;color:var(--ink);border:1px solid #ddd;
    border-radius:24px;padding:12px 18px;font-size:16px;font-family:var(--body);outline:none;max-height:100px;}
  #msgInput::placeholder{color:#b0b0b0;}
  #sendBtn{background:var(--accent);color:#fff;border:none;border-radius:50%;width:44px;height:44px;
    font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  #sendBtn:disabled{background:#e0e0e0;cursor:default;}
  #endedNote{text-align:center;color:var(--dim);font-size:13px;padding:8px 0;}
  /* media message bubbles */
  .bubble.media{padding:6px;background:var(--sent);border-radius:22px 22px 6px 22px;max-width:78%;}
  .bubble.media audio{display:block;width:240px;max-width:100%;}
  .bubble.media video{display:block;width:240px;max-width:100%;border-radius:16px;}
  .mediaLabel{color:#fff;font-size:11px;opacity:.85;padding:2px 8px 4px;font-family:var(--body);}
  /* input attach buttons */
  .attachBtn{background:transparent;color:var(--accent);border:none;
    width:38px;height:38px;cursor:pointer;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;border-radius:50%;}
  .attachBtn:active{background:#f0eaf0;}
  /* recording overlay */
  #recBar{display:none;align-items:center;gap:12px;padding:10px 6px;}
  #recBar.show{display:flex;}
  #recDot{width:12px;height:12px;border-radius:50%;background:#e0392b;animation:pulse 1s infinite;flex-shrink:0;}
  #recTime{font-size:15px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;}
  #recLabel{font-size:13px;color:var(--dim);flex:1;}
  #recPreview{width:54px;height:54px;border-radius:12px;object-fit:cover;background:#000;flex-shrink:0;}
  .recAction{border:none;border-radius:20px;padding:9px 16px;font-size:14px;font-weight:700;
    cursor:pointer;font-family:var(--body);}
  .recCancel{background:#eee;color:#666;}
  .recStop{background:#e0392b;color:#fff;}
  .recSend{background:var(--accent);color:#fff;}
  /* lead capture gate */
  #leadGate{position:absolute;inset:0;background:rgba(255,255,255,.96);backdrop-filter:blur(4px);
    display:flex;align-items:center;justify-content:center;padding:24px;z-index:20;
    animation:popIn .3s ease;}
  #leadCard{text-align:center;max-width:300px;width:100%;}
  #leadCard img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);}
  #leadCard h3{font-size:21px;font-weight:800;color:var(--ink);margin:14px 0 6px;}
  #leadCard p{font-size:13.5px;color:var(--dim);line-height:1.5;margin:0 0 18px;}
  #leadCard input{width:100%;border:1px solid #ddd;border-radius:14px;padding:13px 16px;
    font-size:16px;font-family:var(--body);margin-bottom:10px;outline:none;}
  #leadCard input:focus{border-color:var(--accent);}
  #leadErr{color:#c0392b;font-size:12.5px;min-height:16px;margin-bottom:6px;}
  #leadStart{width:100%;background:var(--accent);color:#fff;border:none;border-radius:24px;
    padding:14px;font-size:16px;font-weight:800;cursor:pointer;font-family:var(--body);}
  /* admin panel */
  #adminPanel{position:fixed;inset:0;background:rgba(20,15,25,.55);z-index:50;
    display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto;}
  #adminInner{background:#fff;border-radius:18px;max-width:640px;width:100%;padding:18px 20px;
    box-shadow:0 20px 60px rgba(0,0,0,.4);font-family:var(--body);}
  #adminHead{display:flex;align-items:center;gap:10px;font-size:18px;color:var(--ink);
    padding-bottom:12px;border-bottom:1px solid var(--line);}
  #adminHead button{margin-left:auto;border:none;background:#eee;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:14px;}
  #adminHook{display:flex;gap:8px;margin:12px 0;}
  #adminHook input{flex:1;border:1px solid #ddd;border-radius:10px;padding:9px 12px;font-size:13px;font-family:var(--body);outline:none;}
  #adminHook button{border:none;background:var(--accent);color:#fff;border-radius:10px;padding:9px 14px;font-weight:700;cursor:pointer;}
  .adminLead{border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;}
  .adminLeadTop{display:flex;justify-content:space-between;align-items:baseline;font-size:15px;color:var(--ink);}
  .adminLeadTop span{color:var(--accent);font-size:13px;font-weight:700;}
  .adminMeta{font-size:12px;color:var(--dim);margin:3px 0 10px;}
  .adminConvo{background:#faf8fb;border-radius:10px;padding:10px 12px;max-height:240px;overflow-y:auto;}
  .adminMsg{font-size:13px;line-height:1.5;margin-bottom:5px;color:#333;}
  .adminMsg span{font-weight:800;}
  .adminMsg.aj span{color:#888;}
  .adminMsg.ay span{color:var(--accent);}
  /* character select screen */
  #selectScreen{position:absolute;inset:0;background:#fff;z-index:30;
    display:flex;align-items:center;justify-content:center;padding:24px;animation:popIn .3s ease;}
  #selectInner{text-align:center;width:100%;}
  #hingeLogo{font-family:var(--body);font-weight:900;font-size:44px;color:var(--accent);
    letter-spacing:-1px;margin-bottom:22px;line-height:1;}
  #selectTitle{font-size:24px;font-weight:800;color:var(--ink);margin-bottom:6px;}
  #selectSub{font-size:14px;color:var(--dim);margin-bottom:26px;}
  #pickRow{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
  .pickCard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px 14px;
    cursor:pointer;width:130px;transition:transform .15s, box-shadow .15s, border-color .15s;
    display:flex;flex-direction:column;align-items:center;gap:8px;font-family:var(--body);}
  .pickCard:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(104,41,96,.18);border-color:var(--accent);}
  .pickCard img{width:96px;height:96px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);}
  .pickName{font-size:18px;font-weight:800;color:var(--ink);}
  .pickTag{font-size:11px;color:var(--dim);line-height:1.35;}
  @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.5}40%{transform:translateY(-5px);opacity:1}}
  @keyframes popIn{from{opacity:0;transform:translateY(6px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
</style>
</head>

</div>

// Each character: who they are for the UI + which server "persona" to use.
// The actual personality prompt lives server-side in api/chat.js, keyed by `persona`.
const CHARACTERS = {
  jen: {
    name: "Jen",
    photo: JEN_PHOTO,
    persona: "jen",
    opener: "hey 🙂, what interested you in talking to me?",
    tagline: ""
  },
  leah: {
    name: "Leah",
    photo: LEAH_PHOTO,
    persona: "leah",
    opener: "hi! 😊 so what made you want to chat with me?",
    tagline: ""
  }
};

let ACTIVE = null;            // set once the user picks a character
let PHOTO = JEN_PHOTO;        // active character's photo (kept in sync)

document.getElementById("headerPhoto").src = JEN_PHOTO;

const JEN_SYSTEM = ""; // personality now lives on the server (api/chat.js)

const MAX_SECONDS = 600;
let seconds = MAX_SECONDS;
let started = false;
let ended = false;
let thinking = false;
let timerInterval = null;
let messages = []; // populated with the chosen character's opener after selection

const messagesEl = document.getElementById("messages");
let inputEl = document.getElementById("msgInput");
let sendBtn = document.getElementById("sendBtn");
const timerBanner = document.getElementById("timerBanner");
const timerText = document.getElementById("timerText");

function fmt(s){ const m=Math.floor(s/60), sec=s%60; return m+":"+String(sec).padStart(2,"0"); }

// Reveal a Jen message one character at a time. Resolves when fully shown.
let streaming = null; // {text, shown} for the message currently typing
function typewriterAdd(fullText){
  return new Promise(resolve=>{
    if(ended){ resolve(); return; }
    streaming = { text: fullText, shown: 0 };
    render(); // draw the streaming bubble once
    // grab the streaming bubble element so we can update just its text (no full re-render -> no flashing)
    const streamBubble = messagesEl.querySelector(".bubble.jen.streaming");
    const tick = ()=>{
      if(ended){ streaming = null; resolve(); return; }
      streaming.shown += 1;
      if(streaming.shown >= streaming.text.length){
        const finished = streaming.text;
        streaming = null;
        messages.push({ role:"jen", text: finished });
        render();
        saveConversation("in progress");
        resolve();
      } else {
        // update ONLY the text of the streaming bubble
        if(streamBubble){
          streamBubble.textContent = streaming.text.slice(0, streaming.shown);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
        const ch = streaming.text[streaming.shown-1];
        const delay = /[.!?,]/.test(ch) ? 70 : 14;
        setTimeout(tick, delay);
      }
    };
    setTimeout(tick, 10);
  });
}

function render(){
  messagesEl.innerHTML = "";
  messages.forEach(m=>{
    const row = document.createElement("div");
    row.className = "row " + (m.role==="jen" ? "jen" : "you");
    if(m.role==="jen"){
      const img = document.createElement("img");
      img.className = "msgPhoto"; img.src = PHOTO; img.alt=ACTIVE ? ACTIVE.name : "";
      row.appendChild(img);
    }
    const b = document.createElement("div");
    if(m.kind === "audio" || m.kind === "video"){
      b.className = "bubble media you";
      const el = document.createElement(m.kind);
      el.src = m.url;
      el.controls = true;
      const label = document.createElement("div");
      label.className = "mediaLabel";
      label.textContent = (m.kind === "audio" ? "🎤 voice message" : "📹 video message");
      b.appendChild(label);
      b.appendChild(el);
    } else {
      b.className = "bubble " + (m.role==="jen" ? "jen" : "you");
      b.textContent = m.text;
    }
    row.appendChild(b);
    messagesEl.appendChild(row);
  });
  // currently-streaming Jen message (revealed one char at a time)
  if(streaming){
    const row = document.createElement("div");
    row.className = "row jen";
    const img = document.createElement("img");
    img.className="msgPhoto"; img.src=PHOTO; img.alt=ACTIVE ? ACTIVE.name : "";
    row.appendChild(img);
    const b = document.createElement("div");
    b.className = "bubble jen streaming";
    b.textContent = streaming.text.slice(0, streaming.shown);
    row.appendChild(b);
    messagesEl.appendChild(row);
  }
  if(thinking){
    const row = document.createElement("div");
    row.className = "row jen";
    const img = document.createElement("img");
    img.className="msgPhoto"; img.src=PHOTO; img.alt=ACTIVE ? ACTIVE.name : "";
    row.appendChild(img);
    const t = document.createElement("div");
    t.className="typing";
    t.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
    row.appendChild(t);
    messagesEl.appendChild(row);
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function updateTimer(){
  if(ended) return;
  if(!started){ timerText.textContent = "⏱ you have 10 min max, once you reply before the human Jen decides if she'll get in touch with you"; return; }
  timerText.textContent = "⏱ " + fmt(seconds) + " left — then the human " + (ACTIVE?ACTIVE.name:"") + " decides if she'll reach out";
  if(seconds <= 60){ timerBanner.classList.add("low"); } else { timerBanner.classList.remove("low"); }
}

function tick(){
  if(ended || !started) return;
  seconds--;
  updateTimer();
  if(seconds <= 0){ endDate(); }
}

async function callJen(history){
  const apiMessages = history.map(m=>({ role: m.role==="jen" ? "assistant" : "user", content: m.text || (m.kind ? "["+m.kind+" message]" : "") }));
  const res = await fetch("/api/chat", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ messages: apiMessages, persona: ACTIVE ? ACTIVE.persona : "jen" })
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok || data.error){
    console.error("[chat] backend error:", res.status, data);
    throw new Error(data.error ? (data.error + (data.detail ? " — "+data.detail : "")) : ("HTTP "+res.status));
  }
  return (data.reply || "").trim();
}

async function send(){
  const t = inputEl.value.trim();
  if(!t || thinking || ended) return;
  if(!started){ started = true; timerInterval = setInterval(tick, 1000); updateTimer(); }
  messages.push({ role:"you", text:t });
  inputEl.value = "";
  inputEl.style.height = "auto";
  thinking = true;
  sendBtn.disabled = true;
  render();
  try{
    const reply = await callJen(messages);
    if(ended) return;
    if(reply && reply.includes("[[MD_DETECTED]]")){
      thinking = false; sendBtn.disabled = false;
      mdMatch();
      return;
    }
    thinking = false; sendBtn.disabled = false; render();
    if(reply){ await typewriterAdd(reply); }
    else {
      // empty reply: retry once quietly
      thinking = true; render();
      const retry = await callJen(messages);
      thinking = false; render();
      if(retry && !ended) await typewriterAdd(retry);
      else if(!ended) await typewriterAdd("Hang on, give me a sec — what were you saying? 🙂");
    }
  }catch(e){
    // Don't break character. Retry once quietly, then stay graceful.
    try{
      const retry = await callJen(messages);
      thinking = false; sendBtn.disabled = false; render();
      if(retry && !ended) await typewriterAdd(retry);
      else if(!ended) await typewriterAdd("Hang on, give me a sec — what were you saying? 🙂");
    }catch(e2){
      thinking = false; sendBtn.disabled = false;
      if(location.search.includes("debug")){
        if(!ended) await typewriterAdd("[debug] " + String(e2 && e2.message || e2));
      } else if(!ended){
        await typewriterAdd("Hang on, give me a sec — what were you saying? 🙂");
      }
    }
  }finally{
    thinking = false;
    sendBtn.disabled = false;
    render();
    saveConversation("in progress");
  }
}

async function endDate(){
  if(ended) return;
  ended = true;
  earlySent = true; // normal end path owns the send; block early-exit duplicate
  if(timerInterval) clearInterval(timerInterval);
  timerBanner.style.display = "none";
  saveConversation("time up — Jen to decide");
  document.getElementById("inputBar").innerHTML = '<div id="endedNote">the 10 minutes are up — Jen will be in touch 💌</div>';

  messagesEl.appendChild(card);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  try{
    const transcript = messages.map(m=>(m.role==="jen"?"Jen":"Match")+": "+m.text).join("\n");
    const __unused_prompt = transcript;
    const res = await fetch("/api/debrief", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ transcript: transcript, persona: ACTIVE ? ACTIVE.persona : "jen", lead: (currentLead || {}) })
    });

}

// Send the conversation if the person leaves BEFORE the timer ends (closes tab,
// switches away, etc). Without this, only full 10-minute chats would ever email.
let earlySent = false;
async function sendEarlyExit(){
  if(earlySent || ended) return;
  // only bother if there was a real exchange (the person actually replied)
  const userMsgs = messages.filter(m=>m.role==="you").length;
  if(userMsgs < 1 || !ACTIVE) return;
  earlySent = true;
  try{
    const transcript = messages.map(m=>(m.role==="jen"?ACTIVE.name:"Match")+": "+(m.text||(m.kind?"["+m.kind+" message]":""))).join("\n");
    const payload = JSON.stringify({ transcript: transcript, persona: ACTIVE.persona, lead: (currentLead || {}), early: true });
    // sendBeacon survives the page closing; fall back to fetch+keepalive
    if(navigator.sendBeacon){
      navigator.sendBeacon("/api/debrief", new Blob([payload], {type:"application/json"}));
    } else {
      fetch("/api/debrief", { method:"POST", headers:{"Content-Type":"application/json"}, body: payload, keepalive:true });
    }
  }catch(e){}
}
// Fire on tab close / navigate away / app backgrounding
window.addEventListener("pagehide", sendEarlyExit);
window.addEventListener("beforeunload", sendEarlyExit);
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="hidden") sendEarlyExit(); });

let mediaRecorder = null, recChunks = [], recStream = null, recKind = null;
let recSeconds = 0, recInterval = null, recordedBlobUrl = null, recordedKind = null;
let speechRec = null, lastTranscript = "";

function startSpeechRecognition(){
  lastTranscript = "";
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return; // browser can't transcribe locally; we'll still send the audio
  try{
    speechRec = new SR();
    speechRec.continuous = true;
    speechRec.interimResults = true;
    speechRec.lang = "en-US";
    speechRec.onresult = (ev)=>{
      let finalT = "";
      for(let i=0;i<ev.results.length;i++){ finalT += ev.results[i][0].transcript; }
      lastTranscript = finalT.trim();
    };
    speechRec.onerror = ()=>{};
    speechRec.start();
  }catch(e){ speechRec = null; }
}
function stopSpeechRecognition(){
  if(speechRec){ try{ speechRec.stop(); }catch(e){} speechRec = null; }
}

const recBar = document.getElementById("recBar");
const recTime = document.getElementById("recTime");
const recLabel = document.getElementById("recLabel");
const recPreview = document.getElementById("recPreview");
const recDot = document.getElementById("recDot");
const recCancelBtn = document.getElementById("recCancelBtn");
const recStopBtn = document.getElementById("recStopBtn");
const recSendBtn = document.getElementById("recSendBtn");
const inputRow = document.getElementById("inputRow");

function recFmt(s){ const m=Math.floor(s/60), sec=s%60; return m+":"+String(sec).padStart(2,"0"); }

async function startRecording(kind){
  if(ended || thinking) return;
  recKind = kind;
  try{
    const constraints = kind === "video" ? { audio:true, video:true } : { audio:true };
    recStream = await navigator.mediaDevices.getUserMedia(constraints);
  }catch(e){
    alert("Couldn't access your " + (kind==="video"?"camera/mic":"microphone") + ". Check browser permissions (recording needs https or localhost).");
    return;
  }
  recChunks = [];
  const mime = kind === "video"
    ? (MediaRecorder.isTypeSupported("video/webm") ? "video/webm" : "")
    : (MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "");
  mediaRecorder = mime ? new MediaRecorder(recStream, { mimeType: mime }) : new MediaRecorder(recStream);
  mediaRecorder.ondataavailable = e => { if(e.data.size) recChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recChunks, { type: recKind==="video" ? "video/webm" : "audio/webm" });
    recordedBlobUrl = URL.createObjectURL(blob);
    recordedKind = recKind;
    recLabel.textContent = "ready to send";
    recDot.style.animation = "none";
    recDot.style.background = "#34a853";
    recStopBtn.style.display = "none";
    recSendBtn.style.display = "inline-block";
    if(recStream) recStream.getTracks().forEach(t=>t.stop());
  };

  // UI into recording mode
  inputRow.style.display = "none";
  recBar.classList.add("show");
  recDot.style.animation = "pulse 1s infinite";
  recDot.style.background = "#e0392b";
  recStopBtn.style.display = "inline-block";
  recSendBtn.style.display = "none";
  recLabel.textContent = kind==="video" ? "recording video…" : "recording…";
  recSeconds = 0; recTime.textContent = "0:00";
  recInterval = setInterval(()=>{ recSeconds++; recTime.textContent = recFmt(recSeconds); if(recSeconds>=120) stopRecording(); }, 1000);

  if(kind === "video"){
    recPreview.style.display = "block";
    recPreview.srcObject = recStream;
    recPreview.play().catch(()=>{});
  } else {
    recPreview.style.display = "none";
  }
  startSpeechRecognition();
  mediaRecorder.start();
}

function stopRecording(){
  if(mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
  stopSpeechRecognition();
  if(recInterval){ clearInterval(recInterval); recInterval = null; }
  recPreview.srcObject = null;
}

function resetRecUI(){
  recBar.classList.remove("show");
  inputRow.style.display = "flex";
  recPreview.style.display = "none";
  recSendBtn.style.display = "none";
  recStopBtn.style.display = "inline-block";
  recordedBlobUrl = null; recordedKind = null;
}

function cancelRecording(){
  stopRecording();
  if(recStream) recStream.getTracks().forEach(t=>t.stop());
  resetRecUI();
}

async function sendRecording(){
  if(!recordedBlobUrl){ // still recording — stop first then send on next tap
    stopRecording();
    setTimeout(sendRecording, 300);
    return;
  }
  const kind = recordedKind;
  const url = recordedBlobUrl;
  const transcript = (lastTranscript || "").trim();
  if(!started){ started = true; timerInterval = setInterval(tick, 1000); updateTimer(); }
  // Show the playable message bubble AND attach the transcript so Jen can answer it.
  messages.push({ role:"you", kind: kind, url: url, text: transcript });
  resetRecUI();
  render();
  thinking = true; sendBtn.disabled = true; render();
  try{
    // Build history; for the media message, feed Jen the transcribed words so she replies to the actual content.
    const history = messages.map(m => {
      if(m.kind){
        const spoken = (m.text && m.text.length)
          ? m.text
          : "(couldn't make out the audio)";
        return { role:"user", content: "[" + (m.kind==="video"?"video":"voice") + " message] " + spoken };
      }
      return { role: m.role==="jen"?"assistant":"user", content: m.text };
    });
    const res = await fetch("/api/chat", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ messages: history, persona: ACTIVE ? ACTIVE.persona : "jen" })
    });
    if(!res.ok) throw new Error("chat endpoint failed");
    const data = await res.json();
    let reply = (data.reply || "").trim();
    if(reply.includes("[[MD_DETECTED]]")){ thinking=false; sendBtn.disabled=false; render(); mdMatch(); return; }
    if(!reply) reply = "Aw, I loved hearing that 🥰 tell me more";
    thinking = false; sendBtn.disabled = false; render();
    if(!ended) await typewriterAdd(reply);
  }catch(e){
    try{
      const retry = await callJen(messages.map(m=>({role:m.role,text:m.text||"[message]"})));
      thinking = false; sendBtn.disabled = false; render();
      if(retry && !ended) await typewriterAdd(retry);
      else if(!ended) await typewriterAdd("Aw, I loved that 🥰 keep going");
    }catch(e2){
      thinking = false; sendBtn.disabled = false;
      if(!ended) await typewriterAdd("Aw, I loved that 🥰 keep going");
    }
  }finally{
    thinking = false; sendBtn.disabled = false; render();
    saveConversation("in progress");
  }
}

// ---- MD instant-match screen ----

// ---- lead capture + admin storage (client-side) ----
const LEADS_KEY = "jen_leads_v1";
let currentLead = null;

function loadLeads(){
  try{ return JSON.parse(localStorage.getItem(LEADS_KEY) || "[]"); }catch(e){ return []; }
}
function persistLeads(arr){
  try{ localStorage.setItem(LEADS_KEY, JSON.stringify(arr)); }catch(e){}
}

function ensureLead(){
  if(!currentLead){
    currentLead = { id: Date.now()+"_"+Math.random().toString(36).slice(2,7), name:"", email:"", phone:"", startedAt: new Date().toISOString() };
    notifyOwnerNewChat(currentLead);
  }
}

// Pull email + phone out of what the person typed across the whole chat.
function extractContacts(){
  const userText = messages.filter(m=>m.role==="you").map(m=>m.text||"").join("  ");
  const email = (userText.match(/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/) || [])[0] || "";
  // phone: 10+ digits, allow spaces, dashes, parens, +
  let phone = "";
  const phoneMatch = userText.match(/(\+?\d[\d\s().-]{8,}\d)/);
  if(phoneMatch){ const digits = phoneMatch[1].replace(/[^\d]/g,""); if(digits.length>=10) phone = phoneMatch[1].trim(); }
  if(email && currentLead) currentLead.email = email;
  if(phone && currentLead) currentLead.phone = phone;
}

function saveConversation(outcome){
  ensureLead();
  extractContacts();
  const leads = loadLeads();
  const idx = leads.findIndex(l => l.id === currentLead.id);
  const record = {
    id: currentLead.id,
    name: currentLead.name || "",
    email: currentLead.email || "",
    phone: currentLead.phone || "",
    startedAt: currentLead.startedAt,
    endedAt: new Date().toISOString(),
    outcome: outcome || "",
    messages: messages.map(m => ({ role: m.role, text: m.text || (m.kind ? "["+m.kind+" message]" : "") }))
  };
  if(idx >= 0) leads[idx] = record; else leads.push(record);
  persistLeads(leads);
}

// Best-effort "notify me right away" hook. Without a backend this can only
// log + optionally ping a webhook URL the owner pastes in. See note below.
function notifyOwnerNewChat(lead){
  console.log("[Jen admin] New chat started:", lead.startedAt);
  const hook = localStorage.getItem("jen_notify_webhook");
  if(hook){
    try{
      fetch(hook, { method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ event:"new_chat", time:lead.startedAt }) });
    }catch(e){}
  }
}

// ---- admin panel ----
function openAdmin(){
  const leads = loadLeads();
  const panel = document.createElement("div");
  panel.id = "adminPanel";
  let html = '<div id="adminInner"><div id="adminHead"><b>Jen · admin</b> <span style="color:#8a8a8a;font-weight:400;">'+leads.length+' chat(s)</span><button id="adminClose">✕</button></div>';
  html += '<div id="adminHook"><input id="hookInput" placeholder="optional: paste a webhook URL to get pinged on new chats" value="'+(localStorage.getItem("jen_notify_webhook")||"")+'"/><button id="hookSave">save</button></div>';
  if(leads.length === 0){
    html += '<div style="padding:24px;color:#8a8a8a;text-align:center;">No conversations yet. They\u2019ll appear here after someone chats.</div>';
  } else {
    leads.slice().reverse().forEach(l => {
      const nm = l.name || "(name not given)";
      const contactBits = [];
      if(l.email) contactBits.push("✉ "+escapeHtml(l.email));
      if(l.phone) contactBits.push("📞 "+escapeHtml(l.phone));
      const contactStr = contactBits.length ? contactBits.join("  ") : "(no contact captured)";
      html += '<div class="adminLead"><div class="adminLeadTop"><b>'+escapeHtml(nm)+'</b><span>'+contactStr+'</span></div>';
      html += '<div class="adminMeta">'+new Date(l.startedAt).toLocaleString()+' · '+escapeHtml(l.outcome||"")+'</div>';
      html += '<div class="adminConvo">';
      l.messages.forEach(m => {
        html += '<div class="adminMsg '+(m.role==="jen"?"aj":"ay")+'"><span>'+(m.role==="jen"?"Jen":escapeHtml(nm))+':</span> '+escapeHtml(m.text)+'</div>';
      });
      html += '</div></div>';
    });
  }
  html += '</div>';
  panel.innerHTML = html;
  document.body.appendChild(panel);
  document.getElementById("adminClose").addEventListener("click", ()=>panel.remove());
  document.getElementById("hookSave").addEventListener("click", ()=>{
    localStorage.setItem("jen_notify_webhook", document.getElementById("hookInput").value.trim());
    document.getElementById("hookSave").textContent = "saved ✓";
  });
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

// Open admin with Ctrl+Shift+J (or add ?admin to the URL)
document.addEventListener("keydown", e=>{
  if(e.ctrlKey && e.shiftKey && (e.key==="J"||e.key==="j")){ openAdmin(); }
});
if(location.search.includes("admin")) setTimeout(openAdmin, 300);

// ---- character selection ----
function startChat(key){
  ACTIVE = CHARACTERS[key];
  PHOTO = ACTIVE.photo;
  // fully reset chat state so switching characters starts fresh
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
  seconds = MAX_SECONDS;
  started = false;
  ended = false;
  thinking = false;
  streaming = null;
  currentLead = null;

  if(!document.getElementById("msgInput")){
    document.getElementById("inputBar").innerHTML = '<div id="inputRow">'
      + '<textarea id="msgInput" rows="1" placeholder="Message"></textarea>'
      + '<button id="voiceBtn" class="attachBtn" title="Record voice message" aria-label="Voice message"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"></rect><path d="M5 10v1a7 7 0 0 0 14 0v-1"></path><line x1="12" y1="18" x2="12" y2="22"></line></svg></button>'
      + '<button id="videoBtn" class="attachBtn" title="Record video message" aria-label="Video message"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"></path><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg></button>'

  if(sel) sel.remove();

function backToSelect(){
  // stop everything cleanly and show the picker again
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
  thinking = false; streaming = null;
  if(!document.getElementById("selectScreen")) showSelect();
}

function showSelect(){
  const sel = document.createElement("div");
  sel.id = "selectScreen";
  let cards = "";
  Object.keys(CHARACTERS).forEach(key=>{
    const c = CHARACTERS[key];
    cards += '<button class="pickCard" data-key="'+key+'">'
      + '<img src="'+c.photo+'" alt="'+c.name+'"/>'
      + '<div class="pickName">'+c.name+'</div>'
      + (c.tagline ? '<div class="pickTag">'+c.tagline+'</div>' : '')
      + '</button>';
  });
  sel.innerHTML = '<div id="selectInner"><div id="hingeLogo">Hinge</div><div id="selectTitle">Who do you want to date?</div>'
    + '<div id="selectSub">Pick someone to start a 10-minute chat 💛</div>'
    + '<div id="pickRow">'+cards+'</div></div>';
  document.getElementById("phone").appendChild(sel);
  sel.querySelectorAll(".pickCard").forEach(btn=>{
    btn.addEventListener("click", ()=>startChat(btn.getAttribute("data-key")));
  });
}

function rebindInput(){
  inputEl = document.getElementById("msgInput");
  sendBtn = document.getElementById("sendBtn");
  const vb = document.getElementById("voiceBtn");
  const vd = document.getElementById("videoBtn");
  if(sendBtn) sendBtn.addEventListener("click", send);
  if(inputEl){
    inputEl.addEventListener("keydown", e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); } });
    inputEl.addEventListener("input", ()=>{ inputEl.style.height="auto"; inputEl.style.height=Math.min(inputEl.scrollHeight,100)+"px"; });
  }
  if(vb) vb.addEventListener("click", ()=>startRecording("audio"));
  if(vd) vd.addEventListener("click", ()=>startRecording("video"));
}

recCancelBtn.addEventListener("click", cancelRecording);
recStopBtn.addEventListener("click", stopRecording);
recSendBtn.addEventListener("click", sendRecording);

// back button (‹) returns to the character picker
document.getElementById("back").addEventListener("click", backToSelect);

rebindInput();

render();
updateTimer();
showSelect();
